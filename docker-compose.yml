services:


  mysql:
    image: mysql:8.0
    container_name: skillandyou-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - skillandyou-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5


  mongodb:
    image: mongo:7.0
    container_name: skillandyou-mongodb
    volumes:
      - mongo_data:/data/db
    networks:
      - skillandyou-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: skillandyou-backend
    environment:

      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      SPRING_MONGODB_URI: ${SPRING_MONGODB_URI}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}

      UPLOAD_PATH: ${UPLOAD_PATH}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - skillandyou-network


  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: skillandyou-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - skillandyou-network


volumes:
  mysql_data:
  mongo_data:
  uploads_data:


networks:
  skillandyou-network:
    driver: bridge
