name: CD — Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  test-backend:
    name: Tests Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Lancer les tests Maven
        working-directory: ./back
        run: mvn test -B

  test-frontend:
    name: Tests Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Installer les dépendances
        working-directory: ./front
        run: npm ci

      - name: Vérifier le build TypeScript
        working-directory: ./front
        run: npm run build

  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: ghcr.io/daniel69110/skillandyou-backend:latest

      - name: Build & Push image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ghcr.io/daniel69110/skillandyou-frontend:latest

  deploy:
    name: Deploy sur Railway
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy sur Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
