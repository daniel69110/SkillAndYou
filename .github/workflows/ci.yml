name: CI — Tests automatiques

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  test-backend:
    name: Tests Backend (Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Lancer les tests Maven
        working-directory: ./back
        run: mvn test -B

  test-frontend:
    name: Tests Frontend (React/Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Installer les dépendances
        working-directory: ./front
        run: npm ci

      - name: Vérifier le build TypeScript
        working-directory: ./front
        run: npm run build
